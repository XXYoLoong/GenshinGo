<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>GenshinGo</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cpath fill='%233f63f4' d='M24 4 29.4 18.6 45 24l-15.6 5.4L24 44l-5.4-14.6L3 24l15.6-5.4L24 4Z'/%3E%3Ccircle cx='24' cy='24' r='6' fill='white'/%3E%3C/svg%3E"/>
    <link rel="stylesheet" href="/css/app.css"/>
</head>
<body>
<svg class="svg-defs" aria-hidden="true">
    <symbol id="icon-mark" viewBox="0 0 48 48">
        <path fill="currentColor" d="M24 4 29.4 18.6 45 24l-15.6 5.4L24 44l-5.4-14.6L3 24l15.6-5.4L24 4Z"/>
        <circle cx="24" cy="24" r="6" fill="#fff"/>
    </symbol>
    <symbol id="icon-search" viewBox="0 0 24 24">
        <path d="m21 21-4.7-4.7m2.2-5.5a7.7 7.7 0 1 1-15.4 0 7.7 7.7 0 0 1 15.4 0Z"/>
    </symbol>
    <symbol id="icon-sidebar" viewBox="0 0 24 24">
        <rect x="3" y="4" width="18" height="16" rx="3"/>
        <path d="M9 4v16"/>
    </symbol>
    <symbol id="icon-plus" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <path d="M12 8v8M8 12h8"/>
    </symbol>
    <symbol id="icon-shield" viewBox="0 0 24 24">
        <path d="M12 3 20 6.5v5.7c0 4.7-3.2 7.4-8 8.8-4.8-1.4-8-4.1-8-8.8V6.5L12 3Z"/>
        <path d="m8.5 12.2 2.2 2.2 4.8-5"/>
    </symbol>
    <symbol id="icon-globe" viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="9"/>
        <path d="M3 12h18M12 3c2.2 2.2 3.3 5.2 3.3 9S14.2 18.8 12 21c-2.2-2.2-3.3-5.2-3.3-9S9.8 5.2 12 3Z"/>
    </symbol>
    <symbol id="icon-paperclip" viewBox="0 0 24 24">
        <path d="m8.5 12.4 5.8-5.8a3.4 3.4 0 1 1 4.8 4.8L11 19.5a5 5 0 0 1-7.1-7.1l8.4-8.4"/>
    </symbol>
    <symbol id="icon-arrow-up" viewBox="0 0 24 24">
        <path d="M12 19V5M5.5 11.5 12 5l6.5 6.5"/>
    </symbol>
    <symbol id="icon-more" viewBox="0 0 24 24">
        <circle cx="5" cy="12" r="1.7"/><circle cx="12" cy="12" r="1.7"/><circle cx="19" cy="12" r="1.7"/>
    </symbol>
    <symbol id="icon-external" viewBox="0 0 24 24">
        <path d="M14 4h6v6M20 4l-9 9"/>
        <path d="M20 14v4a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h4"/>
    </symbol>
</svg>

<div class="app-shell has-messages" id="appShell">
    <aside class="sidebar" id="sidebar">
        <header class="sidebar-header">
            <a class="brand" href="/" aria-label="GenshinGo">
                <svg class="brand-mark" aria-hidden="true"><use href="#icon-mark"></use></svg>
                <span class="brand-name">GenshinGo</span>
            </a>
            <div class="sidebar-actions">
                <button class="icon-button" type="button" id="btnSearch" title="搜索" aria-label="搜索">
                    <svg aria-hidden="true"><use href="#icon-search"></use></svg>
                </button>
                <button class="icon-button" type="button" id="btnCollapse" title="收起侧栏" aria-label="收起侧栏">
                    <svg aria-hidden="true"><use href="#icon-sidebar"></use></svg>
                </button>
            </div>
        </header>

        <button class="new-chat-button" type="button" id="btnGuide">
            <svg aria-hidden="true"><use href="#icon-plus"></use></svg>
            <span>下载指南</span>
            <kbd>Ctrl + J</kbd>
        </button>

        <nav class="history" id="historyList" aria-label="对话历史"></nav>

        <footer class="account">
            <span class="account-avatar">G</span>
            <span class="account-name">安全下载助手</span>
            <button class="icon-button" type="button" title="更多" aria-label="更多">
                <svg aria-hidden="true"><use href="#icon-more"></use></svg>
            </button>
        </footer>
    </aside>

    <button class="sidebar-restore" type="button" id="btnRestore" title="展开侧栏" aria-label="展开侧栏">
        <svg aria-hidden="true"><use href="#icon-sidebar"></use></svg>
    </button>

    <main class="chat-surface" id="chatSurface">
        <section class="welcome" id="emptyState" aria-live="polite" hidden>
            <div class="welcome-title">
                <svg aria-hidden="true"><use href="#icon-mark"></use></svg>
                <h1 id="heroTitle">如何下载原神</h1>
            </div>
        </section>

        <section class="message-stream" id="messages" aria-live="polite"></section>

        <div class="composer-dock">
            <form class="composer" id="chatForm">
                <label class="sr-only" for="input">向 GenshinGo 继续提问</label>
                <textarea id="input" rows="1" maxlength="24000" placeholder="向 GenshinGo 继续提问" autocomplete="off"></textarea>
                <div class="composer-bottom">
                    <div class="composer-toggles">
                        <button class="toggle-pill" type="button" id="toggleThink" aria-pressed="false">
                            <svg aria-hidden="true"><use href="#icon-shield"></use></svg>
                            <span>安全建议</span>
                        </button>
                        <a class="toggle-pill source-link" href="https://ys.mihoyo.com/main/" target="_blank" rel="noopener noreferrer">
                            <svg aria-hidden="true"><use href="#icon-external"></use></svg>
                            <span>官方页面</span>
                        </a>
                    </div>
                    <div class="composer-actions">
                        <button class="attach-button" type="button" title="附件" aria-label="附件" disabled>
                            <svg aria-hidden="true"><use href="#icon-paperclip"></use></svg>
                        </button>
                        <button class="send-button" type="submit" id="btnSend" title="发送" aria-label="发送" disabled>
                            <svg aria-hidden="true"><use href="#icon-arrow-up"></use></svg>
                        </button>
                    </div>
                </div>
            </form>
            <p class="status-hint" id="statusHint" role="status"></p>
        </div>
    </main>
</div>

<script src="/js/app.js"></script>
</body>
</html>
