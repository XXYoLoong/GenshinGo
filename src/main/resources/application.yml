server:
  port: 8080

spring:
  application:
    name: genshingo

deepseek:
  # 为 true 时在应用就绪后打开默认浏览器；run.bat 会传入 true（Windows 下用 start 调起，不依赖 headless）
  launch-browser: false
  base-url: https://api.deepseek.com
  # 使用环境变量，勿将密钥写入仓库；部署到云端时由 systemd/container 注入。
  api-key: ${DEEPSEEK_API_KEY:}
  request-timeout-seconds: 90
  cloud:
    # 配置后优先调用你的云端聊天代理，例如: http://47.121.183.23/api/ai/text 或 https://your-domain/api/chat
    # 前端仍只调用本 Java 后端 /api/chat，密钥只存在云端代理或本 Java 后端环境变量中。
    chat-url: ${CLOUD_CHAT_API_URL:}
    token: ${CLOUD_API_TOKEN:}
  models:
    flash: deepseek-v4-flash
    pro: deepseek-v4-pro
